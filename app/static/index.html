<!DOCTYPE html>
<html>
<head>
<title>ServiceNow Operational Agent</title>

<style>

body{
    margin:0;
    background:#212121;
    color:white;
    font-family:Segoe UI;
}

.container{
    display:flex;
    flex-direction:column;
    height:100vh;
}

.header{
    padding:15px;
    font-size:22px;
    font-weight:bold;
    border-bottom:1px solid #333;
}

.chat{
    flex:1;
    overflow-y:auto;
    padding:20px;
}

.message{
    margin-bottom:20px;
    display:flex;
}

.user{
    justify-content:flex-end;
}

.agent{
    justify-content:flex-start;
}

.bubble{
    max-width:70%;
    padding:12px;
    border-radius:12px;
}

.user .bubble{
    background:#0b93f6;
}

.agent .bubble{
    background:#444654;
}

.input-area{
    display:flex;
    padding:15px;
    border-top:1px solid #333;
}

input{
    flex:1;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#2f2f2f;
    color:white;
}

button{
    margin-left:10px;
    padding:15px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
🤖 ServiceNow Operational Agent
</div>

<div id="chat" class="chat"></div>

<div class="input-area">
<input
id="message"
placeholder="Message ServiceNow Agent..."
onkeypress="if(event.key==='Enter') sendMessage()"
/>

<button onclick="sendMessage()">Send</button>
</div>

</div>

<script>

async function sendMessage(){

    const input=document.getElementById("message");
    const message=input.value.trim();

    if(!message) return;

    const chat=document.getElementById("chat");

    chat.innerHTML += `
    <div class="message user">
        <div class="bubble">${message}</div>
    </div>`;

    input.value="";

    const response = await fetch("/chat",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            message:message
        })
    });

    const data = await response.json();

    chat.innerHTML += `
    <div class="message agent">
        <div class="bubble">${data.response}</div>
    </div>`;

    chat.scrollTop = chat.scrollHeight;
}

</script>

</body>
</html>
