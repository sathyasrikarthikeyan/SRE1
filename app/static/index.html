
<!DOCTYPE html>
<html>
<head>
<title>ServiceNow Operational Agent</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#212121;
    color:white;
    font-family:'Segoe UI',sans-serif;
    height:100vh;
}

.app{
    display:flex;
    height:100vh;
}

/* Sidebar */

.sidebar{
    width:260px;
    background:#171717;
    border-right:1px solid #333;
    display:flex;
    flex-direction:column;
}

.logo{
    padding:20px;
    font-size:22px;
    font-weight:bold;
    border-bottom:1px solid #333;
}

.new-chat{
    padding:15px;
}

.new-chat button{
    width:100%;
    background:#2f2f2f;
    color:white;
    border:none;
    padding:12px;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
}

.new-chat button:hover{
    background:#3a3a3a;
}

.recent-title{
    padding:10px 15px;
    font-size:16px;
    font-weight:bold;
    color:#cccccc;
}

.chat-list{
    flex:1;
    overflow-y:auto;
}

.chat-item{
    padding:12px 15px;
    cursor:pointer;
    border-radius:8px;
    margin:5px 10px;
    background:#202020;
}

.chat-item:hover{
    background:#2f2f2f;
}

/* Main Area */

.main{
    flex:1;
    display:flex;
    flex-direction:column;
}

.header{
    padding:20px;
    font-size:32px;
    font-weight:bold;
    border-bottom:1px solid #333;
}

.chat{
    flex:1;
    overflow-y:auto;
    padding:25px;
}

.message{
    display:flex;
    margin-bottom:20px;
}

.user{
    justify-content:flex-end;
}

.agent{
    justify-content:flex-start;
}

.bubble{
    max-width:75%;
    padding:14px;
    border-radius:12px;
    line-height:1.5;
    font-size:16px;
}

.user .bubble{
    background:#0b93f6;
}

.agent .bubble{
    background:#444654;
}

/* Input */

.input-area{
    display:flex;
    gap:10px;
    padding:15px;
    border-top:1px solid #333;
}

input{
    flex:1;
    padding:15px;
    border:none;
    outline:none;
    border-radius:12px;
    background:#2f2f2f;
    color:white;
    font-size:16px;
}

.send-btn{
    padding:15px 25px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    background:white;
    color:black;
    font-size:16px;
    font-weight:bold;
}

.send-btn:hover{
    opacity:0.9;
}

</style>

</head>

<body>

<div class="app">

    <!-- Sidebar -->

    <div class="sidebar">

        <div class="logo">
            💬 ServiceNow Agent
        </div>

        <div class="new-chat">
            <button onclick="createChat()">
                + New Chat
            </button>
        </div>

        <div class="recent-title">
            Recent Chats
        </div>

        <div id="chatList" class="chat-list">
        </div>

    </div>

    <!-- Main -->

    <div class="main">

        <div class="header">
            🤖 ServiceNow Operational Agent
        </div>

        <div id="chat" class="chat">
        </div>

        <div class="input-area">

            <input
                id="message"
                placeholder="Message ServiceNow Agent..."
                onkeypress="if(event.key==='Enter') sendMessage()"
            />

            <button
                class="send-btn"
                onclick="sendMessage()">
                Send
            </button>

        </div>

    </div>

</div>

<script>

let currentChatId = null;

async function createChat(){

    const response = await fetch("/new-chat",{
        method:"POST"
    });

    const data = await response.json();

    currentChatId = data.chat_id;

    document.getElementById("chat").innerHTML = "";

    await loadChats();
}

async function loadChats(){

    const response = await fetch("/chats");

    const chats = await response.json();

    const chatList =
        document.getElementById("chatList");

    chatList.innerHTML = "";

    for(const chatId in chats){

        const title =
            chats[chatId].title || "New Chat";

        chatList.innerHTML += `
            <div
                class="chat-item"
                onclick="loadChat('${chatId}')"
            >
                ${title}
            </div>
        `;
    }
}

async function loadChat(chatId){

    currentChatId = chatId;

    const response =
        await fetch(`/chat/${chatId}`);

    const data =
        await response.json();

    const chat =
        document.getElementById("chat");

    chat.innerHTML = "";

    data.messages.forEach(msg => {

        const role =
            msg.role === "user"
            ? "user"
            : "agent";

        chat.innerHTML += `
            <div class="message ${role}">
                <div class="bubble">
                    ${msg.content}
                </div>
            </div>
        `;
    });

    chat.scrollTop =
        chat.scrollHeight;
}

async function sendMessage(){

    if(!currentChatId){
        await createChat();
    }

    const input =
        document.getElementById("message");

    const message =
        input.value.trim();

    if(!message){
        return;
    }

    const chat =
        document.getElementById("chat");

    chat.innerHTML += `
        <div class="message user">
            <div class="bubble">
                ${message}
            </div>
        </div>
    `;

    input.value = "";

    chat.scrollTop =
        chat.scrollHeight;

    const response = await fetch("/chat",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            chat_id: currentChatId,
            message: message
        })
    });

    const data =
        await response.json();

    chat.innerHTML += `
        <div class="message agent">
            <div class="bubble">
                ${data.response}
            </div>
        </div>
    `;

    chat.scrollTop =
        chat.scrollHeight;

    await loadChats();
}

window.onload = async () => {

    await loadChats();

};

</script>

</body>
</html>
